# --- Live bot config ---

# The bot auto-discovers the open event by keyword match on slug. Polymarket
# rotates the slug suffix when re-creating the daily-insult event each month
# (e.g. `...-on` -> `...-on-312`), so a hardcoded slug breaks silently.
# `event_slug_keywords` are ALL required to be in the open event's slug.
event_slug_keywords:
  - trump
  - insult
  - someone
# Optional fallback: if auto-discovery returns nothing, try this exact slug.
event_slug_fallback: will-trump-publicly-insult-someone-on-312

# Execution mode:
#   "limit"  -> place GTC limit BUY at each tier price (maker-friendly, patient)
#   "market" -> legacy: market FOK at the current ask up to cumulative target
order_mode: limit

# When order_mode == "limit", the bot places a LIMIT BUY at each tier price.
# Anti-cross guard: skip placing a tier if current_ask <= tier.price (would
# immediately cross the spread and become a taker — defeats the purpose).
# Existing matching open orders are kept as-is (idempotent), divergent ones
# are cancelled and re-placed.

# Scale-in ladder. Each tier triggers when the YES ask is at or below `price`.
# `pct_of_balance` is the fraction of the *current* USDC balance to deploy at
# that tier, per market. Tiers are NOT cumulative in limit mode -- each tier
# is its own independent resting bid sized by its own pct_of_balance.
# (In legacy market mode tiers are cumulative; see code for details.)
#
# Example with $50 balance, limit mode, ladder 0.70/0.60/0.55 @ 5/10/15%:
#   place 3 GTC bids per market: $2.50 @ 0.70, $5 @ 0.60, $7.50 @ 0.55
#   if market dips gradually each fills at its own price
#   if market crashes past 0.55 all three fill at the lower ask
entry_ladder:
  - price: 0.85
    pct_of_balance: 0.09    # tier 1: fires on routine quotes (current asks 0.83-0.99).
                            # 9% chosen so size>=5sh at 0.85 with $50 balance (clears
                            # the exchange minimum_order_size). +5-10% EV/share at YES
                            # rate >=90% (observed 15/16 = 93.75%). Break-even rate=85%.
  - price: 0.70
    pct_of_balance: 0.08    # tier 2: catches moderate dips (cum 17%)
  - price: 0.55
    pct_of_balance: 0.10    # tier 3: catches deep dips, cum 27% max per market
  # Selected by survival-analysis Monte Carlo (5000 trajectories x 365 sim-days).
  # P(ruin: wealth<20% start) is 0.00% at YES rate >=80%, 0.78% at 75%, 2.80% at 70%.
  # That is STRICTLY better than the previous 0.70/0.60/0.55 cum-33% ladder
  # (which was 0.50% / 2.66% / 8.46% in the same scenarios) -- lower cumulative
  # per-market exposure dominates the slightly higher fragility of the 0.85
  # tier in isolation.
  # The tier at 0.85 is the working tier: with current asks at 0.85-0.99 it
  # has a realistic chance of filling (whereas 0.70 has been parked unfilled
  # for the last 8 days). Deeper tiers protect us from panic-dive scenarios.

# Polymarket enforces ~$1 minimum order value. Skip any top-up below this.
min_order_usdc: 1.0

# Round order size down to this many decimals (USDC has 6; UI shows 2).
order_decimals: 2

# Tolerance when deciding a tier is already filled. If current spent on a
# market is within this fraction of the tier's cumulative target, the bot
# treats the tier as done and won't top up.
tier_fill_tolerance: 0.05

# Safety cutoff: don't buy a market if fewer than this many minutes remain
# before its resolution-day ends. The market's "day" is parsed from its
# question (e.g. "April 21, 2026") and the day is interpreted as ET.
# Rationale: theta decay on the resolution day is brutal. The bot can buy
# the same market days earlier at similar or better prices, so giving up
# the last 8h removes asymmetric tail risk (a late dip to 0.50 means Trump
# is statistically unlikely to insult anyone in the remaining hours).
skip_if_minutes_remaining_below: 480

# --- Diversification / exposure caps ---

# Total fraction of balance the bot will commit (open orders + filled
# positions, summed across all markets). When at or above the cap, no new
# orders are placed. Existing orders are not auto-cancelled.
# 0.65 lets us cover 8 markets at tier 1 (8 x 9% = 72%, but tier 1 doesn't
# all fire simultaneously -- it caps at first 7 placements ~63% balance).
max_total_exposure_pct: 0.65

# Cap on how many distinct markets the bot will hold open orders / positions
# in simultaneously. With ~30 daily markets and a small balance, spreading
# too thin makes per-market exposure tiny and below min_order_usdc.
# The bot prefers markets sorted ascending by minutes-to-EOD (closer first
# but still respecting the time cutoff above), so the top-N nearest markets
# get covered.
max_active_markets: 8

# Order time-in-force when order_mode == "limit". GTC = good til cancelled,
# the order persists indefinitely until filled or cancelled by the bot.
order_time_in_force: GTC

# --- Backtest config ---

backtest:
  # Flat thresholds to simulate. Reports PnL for each separately.
  thresholds: [0.50, 0.60, 0.65, 0.70, 0.75, 0.80]
  # How far back to search for historical daily markets.
  lookback_days: 360
  # Flat USDC amount per qualifying market in the flat-threshold sim.
  position_size_usdc: 10.0
  # Price history granularity in minutes.
  fidelity_minutes: 60

  # Scale-in / tiered entry strategies. Each strategy has a list of tiers.
  # A tier triggers once per market when the YES price first drops at/below
  # its `price`. Tiers are evaluated in order so earlier (higher-priced)
  # tiers fire first.
  tiered_strategies:
    - name: "base_60"
      tiers:
        - price: 0.60
          usdc: 15
    - name: "scale_60_50"
      tiers:
        - price: 0.60
          usdc: 5
        - price: 0.50
          usdc: 10
    - name: "flat_80"
      tiers:
        - price: 0.80
          usdc: 15
    - name: "flat_70"
      tiers:
        - price: 0.70
          usdc: 15
    - name: "scale_80_70"
      tiers:
        - price: 0.80
          usdc: 5
        - price: 0.70
          usdc: 10
    - name: "scale_80_70_60"
      tiers:
        - price: 0.80
          usdc: 3
        - price: 0.70
          usdc: 5
        - price: 0.60
          usdc: 7
    - name: "scale_80_70_60_50"
      tiers:
        - price: 0.80
          usdc: 2
        - price: 0.70
          usdc: 4
        - price: 0.60
          usdc: 4
        - price: 0.50
          usdc: 5
